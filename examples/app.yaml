apiVersion: v1
kind: Secret
metadata:
  name: my-app-creds
  namespace: default
type: Opaque
stringData:
  password: SuperS3cret-loack-demo
---
apiVersion: secretsmanager.services.k8s.aws/v1alpha1
kind: Secret
metadata:
  name: loack-mdoc-secret
spec:
  name: loack-mdoc-secret
  secretString:
    namespace: default
    name: my-app-creds
    key: password
---
apiVersion: sqs.services.k8s.aws/v1alpha1
kind: Queue
metadata:
  name: loack-demo-queue
spec:
  queueName: loack-demo-queue
