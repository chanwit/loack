name: publish-packages

# Publish every installer package under packages/ as an OCI artifact to
# ghcr.io/<owner>/<package>:<version> (and :latest). <version> is
# installerMetadata.version in each package's installer.yaml -- bump it to cut a
# new release of that package. Triggered when any package changes on main, or
# manually.
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'packages/**'
      - '.github/workflows/publish-packages.yml'

permissions:
  contents: read
  packages: write   # push OCI artifacts to ghcr.io

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: false

      # The confighub installer bundles a package source tree into a native OCI
      # artifact and pushes it. No tags upstream yet, so build from main.
      - name: Install the confighub installer
        run: go install github.com/confighub/installer/cmd/installer@main

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish every package
        env:
          OWNER: ${{ github.repository_owner }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          published=0
          for pkg in packages/*/; do
            [ -f "${pkg}installer.yaml" ] || continue
            name=$(basename "$pkg")
            ver=$(awk '/^installerMetadata:/{f=1} f&&/^  version:/{print $2; exit}' "${pkg}installer.yaml")
            [ -n "$ver" ] || { echo "::warning::$name has no installerMetadata.version; skipping"; continue; }
            image="ghcr.io/${OWNER}/${name}"
            echo "publishing oci://${image}:${ver} (+ :latest)"
            installer push "$pkg" "oci://${image}:${ver}"
            installer push "$pkg" "oci://${image}:latest"
            echo "- \`oci://${image}:${ver}\` (+ \`:latest\`)" >> "$GITHUB_STEP_SUMMARY"
            published=$((published + 1))
          done
          echo "published $published package(s)"
          [ "$published" -gt 0 ]
