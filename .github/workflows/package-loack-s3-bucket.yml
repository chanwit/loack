name: package-loack-s3-bucket

# Publish the loack-s3-bucket installer package as an OCI artifact to
# ghcr.io/<owner>/loack-s3-bucket:<version> (and :latest). <version> is
# installerMetadata.version in the package's installer.yaml -- bump it to cut a
# new package release. Triggered when the package changes on main, or manually.
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'packages/loack-s3-bucket/**'
      - '.github/workflows/package-loack-s3-bucket.yml'

permissions:
  contents: read
  packages: write   # push OCI artifacts to ghcr.io

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      PKG_DIR: packages/loack-s3-bucket
      IMAGE: ghcr.io/${{ github.repository_owner }}/loack-s3-bucket
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: false

      # The confighub installer bundles the package source tree into a native
      # OCI artifact (artifactType application/vnd.confighub.installer.package.
      # v1+json) and pushes it. No tags upstream yet, so build from main.
      - name: Install the confighub installer
        run: go install github.com/confighub/installer/cmd/installer@main

      - name: Resolve package version
        id: ver
        run: |
          v=$(awk '/^installerMetadata:/{f=1} f&&/^  version:/{print $2; exit}' "$PKG_DIR/installer.yaml")
          [ -n "$v" ] || { echo "could not read installerMetadata.version from $PKG_DIR/installer.yaml" >&2; exit 1; }
          echo "version=$v" >> "$GITHUB_OUTPUT"
          echo "publishing $IMAGE:$v (+ :latest)"

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push package (in-memory bundle of the source dir)
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          installer push "$PKG_DIR" "oci://$IMAGE:$VERSION"
          installer push "$PKG_DIR" "oci://$IMAGE:latest"

      - name: Summary
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          {
            echo "### Published installer package"
            echo ""
            echo "- \`oci://$IMAGE:$VERSION\`"
            echo "- \`oci://$IMAGE:latest\`"
            echo ""
            echo "Pull: \`installer setup --pull oci://$IMAGE:$VERSION --set bucket_name=...\`"
          } >> "$GITHUB_STEP_SUMMARY"
