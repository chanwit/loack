# controllers.lock -- pinned ACK controller clones for loack.
#
# loack links every wired controller into a single binary, so they MUST all
# resolve the same ACK runtime version (and compatible aws-sdk-go-v2 / k8s.io
# deps). Pinning exact commits keeps that set reproducible and prevents the
# dependency graph from drifting apart.
#
# `make vendor`        clone/checkout each controller at its pinned commit, then
#                      verify they all use RUNTIME below.
# `make vendor-verify` verify existing clones without changing them.
# `make vendor-relock` re-pin to the current clones' HEADs (fails if they no
#                      longer share one runtime).
#
# Each controller is cloned from https://github.com/aws-controllers-k8s/<name>.
# Fields: <controller-name> <commit-sha>

